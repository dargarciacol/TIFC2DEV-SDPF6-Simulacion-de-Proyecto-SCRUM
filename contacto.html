<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contactanos</title>
  <link rel="stylesheet" href="contacto.css">
</head>

<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">Feria de las Flores</a>
      </div>

      <ul class="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="quienesSomos.html">Quiénes Somos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section>
    <h1>Ponte en Contacto </h1>
    <p>
      Tienes preguntas sobre el desfile, los tablados o las fincas silleteras? Nuestro equipo esta listo para florecer
      contigo
    </p>
  </section>

  <main class="container">
    <img src="img/img5.png" alt="">
    <form>
      <div class="group">
        <label for="name">Nombre Completo</label>
        <input type="text" id="name" placeholder="Ej. Juan Valdez">
      </div>
      <div class="group">
        <label for="email">Correo Electronico</label>
        <input type="email" id="email" placeholder="hola@ejemplo.com">
      </div>
      <div class="group">
        <label for="subject">Asunto</label>
        <input type="text" id="subject" placeholder="Información General">
      </div>
      <div class="group">
        <label for="message">Tu Mensaje</label>
        <textarea name="message" id="message" placeholder="Como podemos ayudarte?"></textarea>
      </div>
      <button>Enviar Consulta</button>
    </form>
  </main>
  <div class="iframe">
    <h2>Puedes ubicarnos en</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d63458.35966243235!2d-75.6224112266845!3d6.244287171956132!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e4428dfb80fad05%3A0x42137cfcc7b53b56!2sMedell%C3%ADn%2C%20Antioquia!5e0!3m2!1ses!2sco!4v1784662752238!5m2!1ses!2sco"
      width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</body>

</html>
